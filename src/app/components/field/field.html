<div
  id="container"
  style="
    justify-content: center;
    display: flex;
    gap: 20px;
    flex-direction: column;
    align-items: center;
    margin-top: 120px;
  "
>
  <svg
    width="800"
    height="500"
    (click)="onFieldClick($event)"
    id="fieldGreen"
    style="border: 3px solid black; background-color: green"
  >
    <g *ngFor="let p of points">
      <circle
        [attr.cx]="p.x"
        [attr.cy]="p.y"
        [attr.r]="p.type === 'ball' ? 8 : 12"
        [attr.fill]="p.type === 'playerBlue' ? 'blue' : p.type === 'playerRed' ? 'red' : 'orange'"
      ></circle>
    </g>
  </svg>
  <div class="controls">
    <label *ngFor="let p of points">
      <input type="radio" name="sel" (change)="select(p)" [checked]="selected?.id === p.id" />
      {{ p.type }}
    </label>
  </div>
  <div *ngIf="selected as sel" class="editor">
    X: <input type="number" [(ngModel)]="sel.x" /> Y: <input type="number" [(ngModel)]="sel.y" />
    <button (click)="save()">Mentés</button>
  </div>
</div>
